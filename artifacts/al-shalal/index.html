<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Al-Shalal Logistics</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#6c63ff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="الشلال" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      html, body { background-color: #1a1a2e; }
      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        background-color: #1a1a2e;
        color: #ffffff;
        font-family: Inter, system-ui, -apple-system, sans-serif;
        animation: splash-fade-in 0.3s ease-out;
      }
      #app-splash img {
        width: 160px;
        height: 160px;
        border-radius: 28px;
        box-shadow: 0 10px 40px rgba(108, 99, 255, 0.35);
        animation: splash-pulse 1.6s ease-in-out infinite;
      }
      #app-splash .splash-title {
        font-size: 18px;
        font-weight: 600;
        opacity: 0.9;
        letter-spacing: 0.02em;
      }
      #app-splash .splash-spinner {
        width: 28px;
        height: 28px;
        border: 3px solid rgba(255, 255, 255, 0.18);
        border-top-color: #6c63ff;
        border-radius: 50%;
        animation: splash-spin 0.9s linear infinite;
      }
      @keyframes splash-fade-in { from { opacity: 0; } to { opacity: 1; } }
      @keyframes splash-pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.04); opacity: 0.92; }
      }
      @keyframes splash-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="app-splash">
        <img src="/icon-512.png" alt="الشلال للخدمات اللوجستية" />
        <div class="splash-title">الشلال للخدمات اللوجستية</div>
        <div class="splash-spinner" aria-hidden="true"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
