version: "3.9"

# ============================================================
# Al-Shalal Logistics — Docker Compose
#
# Usage:
#   1. Copy .env.example to .env and fill in values.
#   2. docker compose up --build
#   3. Visit http://localhost (nginx reverse proxy)
# ============================================================

services:
  # ----------------------------------------------------------
  # PostgreSQL 16
  # ----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-alshalal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-alshalal}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-alshalal}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # API Server (Express 5 + Drizzle ORM)
  # ----------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: postgresql://${POSTGRES_USER:-alshalal}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-alshalal}
      SESSION_SECRET: ${SESSION_SECRET}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_OWNER_CHAT_ID: ${TELEGRAM_OWNER_CHAT_ID:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # Frontend (Vite static build served by nginx)
  # ----------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped

  # ----------------------------------------------------------
  # Nginx reverse proxy (port 80)
  # ----------------------------------------------------------
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - frontend

volumes:
  pgdata:
